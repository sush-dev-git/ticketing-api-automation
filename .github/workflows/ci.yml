name: CI

# Run the test suite on every push to main and on every pull request.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm # cache ~/.npm keyed on package-lock.json for faster installs

      # `npm ci` installs exactly what's in package-lock.json — reproducible builds.
      - run: npm ci

      - run: npm test
