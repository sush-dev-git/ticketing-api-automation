name: Deploy docs

# Publish the API docs to GitHub Pages on every push to main.
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Assemble the static site: the Redoc page plus the spec it renders.
      - name: Build site
        run: |
          mkdir -p _site
          cp docs/index.html _site/index.html
          cp openapi.yaml _site/openapi.yaml

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
